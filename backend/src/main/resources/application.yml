server:
  port: 8080

spring:
  application:
    name: ai-kubernetes-agent

# Kubernetes configuration
kubernetes:
  config-path: ${KUBECONFIG_PATH:~/.kube/config}
  # Connection timeouts (in seconds)
  connection-timeout: 30
  read-timeout: 60
  # Investigation settings
  investigation:
    # Maximum number of log lines to collect per pod
    max-log-lines: 100
    # Time window for event analysis (in hours)
    event-analysis-window-hours: 1
    # Enable/disable investigation components
    enabled:
      pod-inspection: true
      logs-collection: true
      events-analysis: true
      deployment-inspection: true
      network-inspection: true

# OpenRouter AI integration configuration
openrouter:
  # API key for OpenRouter (required)
  api-key: ${OPENROUTER_API_KEY:}
  # Base URL for OpenRouter API
  api-url: ${OPENROUTER_API_URL:https://openrouter.ai/api/v1/chat/completions}
  # Default model to use for AI reasoning
  model: ${OPENROUTER_MODEL:anthropic/claude-3-sonnet}
  # Temperature for response generation (0.0 - 2.0, lower = more focused)
  temperature: ${OPENROUTER_TEMPERATURE:0.3}
  # Maximum tokens to generate in response
  max-tokens: ${OPENROUTER_MAX_TOKENS:2000}
  # Request timeout in seconds
  timeout: ${OPENROUTER_TIMEOUT:60}
  # Enable/disable AI diagnosis (fallback to investigation-only if disabled)
  enabled: ${OPENROUTER_ENABLED:true}

# Placeholder for InsForge integration
insforge:
  api-key: ${INSFORGE_API_KEY:}
  api-base-url: ${INSFORGE_API_BASE_URL:}

# Logging configuration
logging:
  level:
    root: INFO
    com.k8s.agent: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

